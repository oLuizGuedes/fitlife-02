<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/styles.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>FitLife | IMC</title>
</head>
<body>

    <nav>
        <a class="logo" href="index.html">
            <i class="fas fa-heartbeat"></i> FitLife
        </a>

        <ul class="nav-links">
            <li><a class="nav-link" href="../index.html">Home</a></li>
            <li><a class="nav-link" id="nav-active" href="imc.html">IMC</a></li>
            <li><a class="nav-link" href="tmb.html">TMB</a></li>
            <li><a class="nav-link" href="water.html">Água</a></li>
        </ul>
    </nav>

    <main>
        <section class="tool-container">

            <div class="tool-container-title">
                <h2><i class="fas fa-weight"></i> Cálculo de IMC</h2>
            </div>

            <form>
                <div class="form-group">
                    <label for="weight">Peso (kg)</label>
                    <input type="number" id="weight" placeholder="Ex: 70" required>
                </div>

                <div class="form-group">
                    <label for="height">Altura (m)</label>
                    <input type="number" id="height" placeholder="Ex: 1.7" required
                    step="any"
                    >
                </div>

                <button class="action-btn" type="submit">Calcular</button>
                <a class="action-btn" href="../index.html">Voltar</a>
            </form>

            <div>
                <p>Seu IMC é:</p>
                <h2>00.0</h2>
                <p>Classificação</p>
            </div>

        </section>
        
    </main>
    
</body>
</html>
